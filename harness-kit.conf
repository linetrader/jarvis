# harness-kit.conf — claude-harness-kit 설정 파일
# install.sh가 자동 생성하며, 직접 수정해도 됩니다.
#
# 이 파일은 sync-harness-docs.sh 와 commit-docs.sh 가 참조합니다.

# ── 프로젝트 목록 ─────────────────────────────────────────────
# ROOT 아래 서브프로젝트 디렉토리명 목록 (배열)
# 예: PROJECTS=("backend" "frontend" "worker")
PROJECTS=("{{PROJECT_A}}" "{{PROJECT_B}}" "{{PROJECT_C}}")

# ── 프로젝트별 테스트 명령 ────────────────────────────────────
# 변수명 형식: TEST_CMD_<프로젝트명> (하이픈은 언더스코어로)
# 예:
#   TEST_CMD_backend="npm test"
#   TEST_CMD_frontend="npm test"
#   TEST_CMD_worker="python3 -m pytest tests/ -q"
TEST_CMD_{{PROJECT_A_US}}="npm test"
TEST_CMD_{{PROJECT_B_US}}="npm test"
TEST_CMD_{{PROJECT_C_US}}="python3 -m pytest tests/ -q"

# ── 포트 드리프트 검사 항목 ──────────────────────────────────
# 형식: "프로젝트|스크립트경로(ROOT 기준)|포트번호"
# 배열을 비워두면 포트 드리프트 검사를 건너뜁니다.
# 예:
#   PORT_CHECKS=(
#     "backend|backend/start.sh|4000"
#     "frontend|frontend/start.sh|3000"
#   )
PORT_CHECKS=(
    # "{{PROJECT_A}}|{{PROJECT_A}}/start.sh|4000"
    # "{{PROJECT_B}}|{{PROJECT_B}}/start.sh|3000"
)

# ── qa-lead.md 케이스 수 패턴 (선택 설정) ────────────────────
# 기본값: r"(\d+)케이스" (한국어 패턴)
# 영어 패턴 예: CASE_COUNT_PATTERN_backend="(\d+) test cases"
# CASE_COUNT_PATTERN_{{PROJECT_A_US}}="(\d+)케이스"
# CASE_COUNT_PATTERN_root="(\d+)케이스"
